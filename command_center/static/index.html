<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectra QA - Command Center</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- SSE Extension for HTMX -->
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
        }
        .card-header {
            border-bottom: 1px solid #334155;
            padding: 1rem;
            font-weight: 600;
            color: #e2e8f0;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-active {
            background-color: #065f46;
            color: #6ee7b7;
        }
        .status-completed {
            background-color: #1e40af;
            color: #93c5fd;
        }
        .status-failed {
            background-color: #991b1b;
            color: #fca5a5;
        }
        .status-pending {
            background-color: #713f12;
            color: #fde047;
        }
        .thought-item {
            border-left: 3px solid #3b82f6;
            padding-left: 0.75rem;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.875rem;
        }
        .agent-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem;
            transition: all 0.2s;
        }
        .agent-card:hover {
            border-color: #475569;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
        }
        .metric-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .log-entry {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 0.5rem;
            background-color: #0f172a;
            border-radius: 0.25rem;
            margin-bottom: 0.25rem;
            color: #94a3b8;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100">
    
    <!-- Header -->
    <header class="border-b border-slate-700 bg-slate-850">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="pulse-dot"></div>
                    <h1 class="text-xl font-bold text-white tracking-tight">
                        Vectra QA <span class="text-blue-400">Command Center</span>
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-slate-400">
                        <span id="connection-status" class="flex items-center">
                            <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                            Live
                        </span>
                    </div>
                    <div class="text-xs text-slate-500" id="last-update">
                        Updated: --
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <!-- Metrics Row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="card p-4">
                <div class="metric-label">Total Tests</div>
                <div class="metric-value" id="metric-total">0</div>
            </div>
            <div class="card p-4">
                <div class="metric-label text-green-400">Passed</div>
                <div class="metric-value text-green-400" id="metric-pass">0</div>
            </div>
            <div class="card p-4">
                <div class="metric-label text-red-400">Failed</div>
                <div class="metric-value text-red-400" id="metric-fail">0</div>
            </div>
            <div class="card p-4">
                <div class="metric-label text-yellow-400">Skipped</div>
                <div class="metric-value text-yellow-400" id="metric-skip">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Orchestrator Feed -->
            <div class="lg:col-span-1">
                <div class="card">
                    <div class="card-header flex items-center justify-between">
                        <span>🧠 Orchestrator Feed</span>
                        <span id="orchestrator-status" class="status-badge status-pending">
                            Pending
                        </span>
                    </div>
                    <div class="p-4">
                        <div id="orchestrator-thoughts" class="space-y-2 max-h-96 overflow-y-auto">
                            <div class="text-slate-500 text-sm italic">
                                Waiting for orchestrator initialization...
                            </div>
                        </div>
                        
                        <div class="mt-4 pt-4 border-t border-slate-700">
                            <div class="text-xs text-slate-500 mb-2">Phase</div>
                            <div id="orchestrator-phase" class="text-sm font-medium text-blue-400">
                                --
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Active Spawns Panel -->
            <div class="lg:col-span-2">
                <div class="card">
                    <div class="card-header flex items-center justify-between">
                        <span>🤖 Active Spawns</span>
                        <span id="active-count" class="text-xs text-slate-400">0 active</span>
                    </div>
                    <div class="p-4">
                        <div id="agents-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="col-span-full text-center py-8 text-slate-500">
                                No active agents
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Memory Nodes Inspector -->
        <div class="mt-6">
            <div class="card">
                <div class="card-header">
                    📚 Obsidian Vault Nodes
                </div>
                <div class="p-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="nodes-grid">
                        <div class="col-span-full text-center py-8 text-slate-500">
                            Loading nodes...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Live Logs -->
        <div class="mt-6">
            <div class="card">
                <div class="card-header">
                    📋 Live Event Log
                </div>
                <div class="p-4">
                    <div id="event-log" class="max-h-64 overflow-y-auto space-y-1">
                        <div class="log-entry">
                            [SYSTEM] Command Center initialized
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // SSE Connection for live updates
        const eventSource = new EventSource('/api/sse/stream');
        
        eventSource.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                updateDashboard(data);
                document.getElementById('last-update').textContent = 
                    'Updated: ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error('Error parsing SSE data:', e);
            }
        };
        
        eventSource.onerror = function() {
            document.getElementById('connection-status').innerHTML = 
                '<span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span>Disconnected';
        };
        
        eventSource.onopen = function() {
            document.getElementById('connection-status').innerHTML = 
                '<span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>Live';
        };

        function updateDashboard(data) {
            // Update metrics
            if (data.orchestrator && data.orchestrator.metrics) {
                const m = data.orchestrator.metrics;
                document.getElementById('metric-total').textContent = m.pass + m.fail + m.skip;
                document.getElementById('metric-pass').textContent = m.pass;
                document.getElementById('metric-fail').textContent = m.fail;
                document.getElementById('metric-skip').textContent = m.skip;
            }
            
            // Update orchestrator status
            if (data.orchestrator) {
                const status = data.orchestrator.status || 'unknown';
                const statusEl = document.getElementById('orchestrator-status');
                statusEl.textContent = status;
                statusEl.className = 'status-badge status-' + status;
                
                document.getElementById('orchestrator-phase').textContent = 
                    data.orchestrator.phase || '--';
                
                // Update thoughts
                if (data.orchestrator.thoughts && data.orchestrator.thoughts.length > 0) {
                    const thoughtsContainer = document.getElementById('orchestrator-thoughts');
                    thoughtsContainer.innerHTML = data.orchestrator.thoughts.map(t => 
                        `<div class="thought-item">${t}</div>`
                    ).join('');
                }
            }
            
            // Update active agents grid
            if (data.agents) {
                const grid = document.getElementById('agents-grid');
                const countEl = document.getElementById('active-count');
                
                if (data.agents.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-8 text-slate-500">
                            No active agents
                        </div>`;
                    countEl.textContent = '0 active';
                } else {
                    countEl.textContent = `${data.agents.length} active`;
                    grid.innerHTML = data.agents.map(agent => `
                        <div class="agent-card">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-semibold text-white">${agent.role}</span>
                                <span class="status-badge status-${agent.status}">${agent.status}</span>
                            </div>
                            <div class="text-sm text-slate-400 mb-2">${agent.objective || 'No objective'}</div>
                            <div class="flex items-center text-xs text-slate-500 space-x-3">
                                <span>ID: ${agent.agent_id}</span>
                                <span>${agent.last_action || ''}</span>
                            </div>
                            <div class="mt-2 text-xs text-slate-600">
                                Started: ${agent.start_time ? new Date(agent.start_time).toLocaleTimeString() : '--'}
                            </div>
                        </div>
                    `).join('');
                }
            }
            
            // Update nodes grid
            if (data.nodes) {
                const nodesGrid = document.getElementById('nodes-grid');
                const nodeEntries = Object.entries(data.nodes).filter(([_, node]) => node !== null);
                
                if (nodeEntries.length === 0) {
                    nodesGrid.innerHTML = `
                        <div class="col-span-full text-center py-8 text-slate-500">
                            No nodes found
                        </div>`;
                } else {
                    nodesGrid.innerHTML = nodeEntries.map(([name, node]) => {
                        const fm = node.frontmatter || {};
                        const status = fm.status || 'unknown';
                        return `
                            <div class="agent-card">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="font-semibold text-white">${name}</span>
                                    <span class="status-badge status-${status}">${status}</span>
                                </div>
                                <div class="text-xs text-slate-500 mb-2">${node.path}</div>
                                <div class="text-xs text-slate-400">
                                    ${fm.agent_role ? `Role: ${fm.agent_role}<br>` : ''}
                                    ${fm.result ? `Result: ${fm.result}<br>` : ''}
                                    Modified: ${new Date(node.last_modified * 1000).toLocaleTimeString()}
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }
            
            // Add to event log
            const logContainer = document.getElementById('event-log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.textContent = `[${timestamp}] Orchestrator: ${data.orchestrator?.status || 'unknown'} | Agents: ${data.agents?.length || 0}`;
            logContainer.insertBefore(logEntry, logContainer.firstChild);
            
            // Keep only last 50 log entries
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        // Initial load
        fetch('/api/orchestrator/status')
            .then(r => r.json())
            .then(data => {
                updateDashboard({
                    orchestrator: data,
                    agents: [],
                    nodes: {}
                });
            });
        
        fetch('/api/agents/active')
            .then(r => r.json())
            .then(data => {
                updateDashboard({
                    orchestrator: {},
                    agents: data.agents,
                    nodes: {}
                });
            });
        
        fetch('/api/nodes/global')
            .then(r => r.json())
            .then(data => {
                updateDashboard({
                    orchestrator: {},
                    agents: [],
                    nodes: data
                });
            });
    </script>
</body>
</html>
