# Vectra QA - Docker Compose Quickstart
#
# This compose file sets up the entire multi-agent testing framework
# with a single command: docker compose up
#
# Services:
#   - mcp-server: MCP Tool Server (port 8080)
#   - command-center: HTMX Dashboard (port 3000)
#   - redis: Task queue and caching backend
#   - vault-watcher: File watcher for Obsidian vault changes
#
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Run: docker compose up --build
#   3. Open http://localhost:3000

services:
  # PostgreSQL + pgvector - Primary database for structured data and vector search
  postgres:
    image: ankane/pgvector:latest
    container_name: vectra-postgres
    environment:
      POSTGRES_DB: vectra_qa
      POSTGRES_USER: vectra
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vectra_dev_password_change_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - vectra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectra -d vectra_qa"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Redis - Task queue (kept for distributed workers, cache moved to PostgreSQL)
  redis:
    image: redis:7-alpine
    container_name: vectra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vectra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # MCP Tool Server - Exposes agent tools via SSE transport
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    container_name: vectra-mcp-server
    ports:
      - "${MCP_SERVER_PORT:-8080}:8080"
    environment:
      - PYTHONPATH=/app
      - OBSIDIAN_VAULT_PATH=/app/obsidian_vault
      # LLM Providers
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-llama3.1:70b}
      # Model Selection
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-openai/gpt-4o}
      - UI_EXPLORER_MODEL=${UI_EXPLORER_MODEL:-minimax/MiniMax-M2.7}
      - CHATBOT_MODEL=${CHATBOT_MODEL:-minimax/MiniMax-M2.7}
      # Worker Configuration
      - VECTRA_LLM_WORKERS=${VECTRA_LLM_WORKERS:-true}
      # Database
      - DATABASE_URL=postgresql://vectra:${DB_PASSWORD:-vectra_dev_password_change_in_production}@postgres:5432/vectra_qa
      - VECTRA_BACKEND=${VECTRA_BACKEND:-dual}
      # LLM Cache (now in PostgreSQL)
      - VECTRA_LLM_CACHE=${VECTRA_LLM_CACHE:-true}
      - VECTRA_LLM_CACHE_TTL=${VECTRA_LLM_CACHE_TTL:-3600}
      # Redis
      - REDIS_URL=redis://redis:6379/0
      # Server Config
      - MCP_TRANSPORT=${MCP_TRANSPORT:-sse}
      - MCP_SERVER_PORT=${MCP_SERVER_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_API_KEY=${MCP_API_KEY:-}
      # Feature Testers
      - HEADLESS=${HEADLESS:-true}
    volumes:
      - obsidian-vault:/app/obsidian_vault
      - ./agents:/app/agents
      - ./mcp_server:/app/mcp_server
    networks:
      - vectra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Command Center Dashboard - FastAPI + HTMX + SSE
  command-center:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: vectra-command-center
    ports:
      - "${COMMAND_CENTER_PORT:-3000}:3000"
    environment:
      - PYTHONPATH=/app
      - OBSIDIAN_VAULT_PATH=/app/obsidian_vault
      - MCP_SERVER_URL=http://mcp-server:8080
      - COMMAND_CENTER_PORT=${COMMAND_CENTER_PORT:-3000}
      - COMMAND_CENTER_HOST=0.0.0.0
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - COMMAND_CENTER_SECRET_KEY=${COMMAND_CENTER_SECRET_KEY:-dev-secret-key-change-in-production}
      - CHATBOT_MODEL=${CHATBOT_MODEL:-minimax/MiniMax-M2.7}
      - CHATBOT_MAX_HISTORY=${CHATBOT_MAX_HISTORY:-50}
      - CHATBOT_ENABLE_STREAMING=${CHATBOT_ENABLE_STREAMING:-true}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
    volumes:
      - obsidian-vault:/app/obsidian_vault
      - ./command_center:/app/command_center
    networks:
      - vectra-network
    depends_on:
      mcp-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Worker Pool - Distributed agent workers
  worker-pool:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    container_name: vectra-worker-pool
    command: python -c "from mcp_server.task_queue import get_task_queue; import time; q = get_task_queue(); print('Worker pool ready'); time.sleep(3600)"
    environment:
      - PYTHONPATH=/app
      - OBSIDIAN_VAULT_PATH=/app/obsidian_vault
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VECTRA_LLM_WORKERS=${VECTRA_LLM_WORKERS:-true}
      - HEADLESS=${HEADLESS:-true}
    volumes:
      - obsidian-vault:/app/obsidian_vault
      - ./agents:/app/agents
      - ./mcp_server:/app/mcp_server
    networks:
      - vectra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Vault Watcher - Monitors Obsidian vault for changes
  vault-watcher:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: vectra-vault-watcher
    command: python -m command_center.obsidian_reader
    environment:
      - PYTHONPATH=/app
      - OBSIDIAN_VAULT_PATH=/app/obsidian_vault
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - obsidian-vault:/app/obsidian_vault
    networks:
      - vectra-network
    depends_on:
      - command-center
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Local LLM (Ollama) for privacy-first testing
  # Uncomment if you want to run local models
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: vectra-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   networks:
  #     - vectra-network
  #   restart: unless-stopped

volumes:
  obsidian-vault:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  # ollama-data:
  #   driver: local

networks:
  vectra-network:
    driver: bridge
