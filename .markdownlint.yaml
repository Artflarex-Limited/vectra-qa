# Markdownlint configuration for Vectra QA
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Line length: disabled or set to 120
line-length: false

# Allow trailing punctuation in headings (e.g., "Getting Started!", "FAQ?")
no-trailing-punctuation: false

# Don't require H1 as first line (frontmatter, badges, etc.)
first-line-h1: false

# Allow inline HTML for MkDocs features
no-inline-html: false

# Allow duplicate headings in different sections
no-duplicate-heading:
  siblings_only: true

# Table column style: too noisy for compact tables
table-column-style: false

# Fenced code language: many output blocks don't need language tags
fenced-code-language: false
