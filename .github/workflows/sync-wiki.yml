name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'wiki/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare wiki content
        run: |
          mkdir -p wiki_output
          
          # Copy main docs (flatten structure)
          if [ -d docs ]; then
            for file in $(find docs -name '*.md' -type f); do
              basename=$(basename "$file" .md)
              cp "$file" "wiki_output/${basename}.md"
            done
          fi
          
          # Copy wiki folder contents (take precedence)
          if [ -d wiki ]; then
            cp wiki/*.md wiki_output/ 2>/dev/null || true
          fi
          
          # Create Home.md if it doesn't exist
          if [ ! -f "wiki_output/Home.md" ] && [ -f "README.md" ]; then
            cp README.md wiki_output/Home.md
          fi
          
          # List prepared files
          echo "Prepared wiki files:"
          ls -la wiki_output/

      - name: Push to Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Auth with gh CLI
          echo "${GH_TOKEN}" | gh auth login --with-token
          
          # Clone wiki repository
          gh repo clone Artflarex-Limited/vectra-qa.wiki wiki_repo || {
            echo "Failed to clone wiki. Ensure wiki is enabled and GITHUB_TOKEN has wiki permissions."
            exit 1
          }
          
          # Copy prepared content to wiki repo
          cp wiki_output/*.md wiki_repo/ 2>/dev/null || true
          
          cd wiki_repo
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "docs(wiki): sync from main repo ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
            git push origin main
            echo "✅ Wiki synced successfully"
          else
            echo "ℹ️ No changes to sync"
          fi
