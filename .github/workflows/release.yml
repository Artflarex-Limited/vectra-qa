name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
      description:
        description: 'Release description'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version
        run: |
          echo "${{ github.event.inputs.version }}" > VERSION
          sed -i "s/version = .*/version = \"${{ github.event.inputs.version }}\"/" pyproject.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION pyproject.toml
          git commit -m "chore(release): bump version to ${{ github.event.inputs.version }}"
          git push

      - name: Create Git tag
        run: |
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Generate release notes
        id: release_notes
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract version section from CHANGELOG
            notes=$(sed -n "/## \[${{ github.event.inputs.version }}\]/,/## \[/p" CHANGELOG.md | sed '$d')
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$notes" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=Release v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: true

      - name: Build Docker images
        run: |
          docker compose build

      - name: Tag Docker images
        run: |
          docker tag vectra-qa-mcp-server artflarex/vectra-qa-mcp:v${{ github.event.inputs.version }}
          docker tag vectra-qa-command-center artflarex/vectra-qa-dashboard:v${{ github.event.inputs.version }}

      - name: Summary
        run: |
          echo "## Release v${{ github.event.inputs.version }} Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Git tag: v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker images built" >> $GITHUB_STEP_SUMMARY
          echo "- Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "  1. Deploy docs: Run 'Deploy Versioned Docs' workflow" >> $GITHUB_STEP_SUMMARY
          echo "  2. Push Docker images to registry (if configured)" >> $GITHUB_STEP_SUMMARY