name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
      description:
        description: 'Release description'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pydantic tenacity filelock structlog validators pytest pytest-asyncio pytest-cov

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run tests
        run: pytest tests/ -v --cov=mcp_server --cov=command_center --cov=agents --cov-report=xml

      - name: Check formatting
        run: black --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy mcp_server/ command_center/ agents/

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version
        run: |
          echo "${{ github.event.inputs.version }}" > VERSION
          sed -i "s/version = .*/version = \"${{ github.event.inputs.version }}\"/" pyproject.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION pyproject.toml
          git commit -m "chore(release): bump version to ${{ github.event.inputs.version }}"
          git push

      - name: Create Git tag
        run: |
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Generate release notes
        id: release_notes
        run: |
          if [ -f CHANGELOG.md ]; then
            notes=$(sed -n "/## \[${{ github.event.inputs.version }}\]/,/## \[/p" CHANGELOG.md | sed '$d')
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$notes" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=Release v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: true

      - name: Build and push MCP server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.mcp
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mcp:v${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:v${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Release v${{ github.event.inputs.version }} Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Git tag: v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker images pushed to ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mcp:v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "  1. Deploy docs: Run 'Deploy Versioned Docs' workflow" >> $GITHUB_STEP_SUMMARY
          echo "  2. Update deployment manifests with new image tags" >> $GITHUB_STEP_SUMMARY
